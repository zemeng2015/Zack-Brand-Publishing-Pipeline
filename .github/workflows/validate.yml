name: Validate Content Pipeline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate content queue
        run: python scripts/validate_queue.py

      - name: Export upload plan
        run: python scripts/export_social_upload_plan.py

      - name: Build social-auto-upload handoff
        run: python scripts/build_social_auto_upload_handoff.py

